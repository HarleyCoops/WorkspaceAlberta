name: workspace-alberta
label: Workspace Alberta
description: Branded Workspace Alberta operator console for Canadian procurement intelligence

palette:
  background:
    hex: "#071417"
    alpha: 1
  midground:
    hex: "#F4E9D8"
    alpha: 1
  foreground:
    hex: "#FFFFFF"
    alpha: 0
  warmGlow: "rgba(242, 165, 65, 0.32)"
  noiseOpacity: 0.85

typography:
  fontSans: 'Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif'
  fontMono: '"JetBrains Mono", ui-monospace, "SF Mono", "Cascadia Mono", Menlo, Consolas, monospace'
  fontUrl: "https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
  baseSize: "16px"
  lineHeight: "1.55"
  letterSpacing: "-0.005em"

layout:
  radius: "0.9rem"
  density: comfortable

colorOverrides:
  card: "color-mix(in srgb, #F4E9D8 5%, #071417)"
  cardForeground: "#F4E9D8"
  primary: "#F2A541"
  primaryForeground: "#071417"
  secondary: "color-mix(in srgb, #F4E9D8 8%, #071417)"
  secondaryForeground: "#F4E9D8"
  muted: "color-mix(in srgb, #F4E9D8 7%, #071417)"
  mutedForeground: "rgba(244, 233, 216, 0.76)"
  accent: "rgba(242, 165, 65, 0.18)"
  accentForeground: "#F4E9D8"
  success: "#60D394"
  warning: "#F2A541"
  destructive: "#EF476F"
  border: "rgba(244, 233, 216, 0.18)"
  input: "rgba(244, 233, 216, 0.18)"
  ring: "#F2A541"

assets:
  bg: "radial-gradient(circle at 12% 0%, rgba(242, 165, 65, 0.22), transparent 34%), radial-gradient(circle at 88% 18%, rgba(96, 211, 148, 0.10), transparent 30%), linear-gradient(135deg, #071417 0%, #102B2F 48%, #071417 100%)"
  custom:
    motto: "Wouldn't it be great if..."

componentStyles:
  card:
    boxShadow: "0 24px 80px rgba(0, 0, 0, 0.28)"
  header:
    borderBottom: "1px solid rgba(244, 233, 216, 0.14)"
  sidebar:
    borderRight: "1px solid rgba(244, 233, 216, 0.14)"
  badge:
    textTransform: "uppercase"

customCSS: |
  :root {
    --workspace-alberta-amber: #F2A541;
    --workspace-alberta-cream: #F4E9D8;
    --workspace-alberta-pine: #071417;
    --workspace-alberta-flag-blue: #005EB8;
    --workspace-alberta-flag-red: #D71920;
    --workspace-alberta-flag-gold: #F2A541;
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    opacity: 0.14;
    background-image:
      linear-gradient(rgba(244, 233, 216, 0.08) 1px, transparent 1px),
      linear-gradient(90deg, rgba(244, 233, 216, 0.08) 1px, transparent 1px);
    background-size: 48px 48px;
    mask-image: radial-gradient(circle at top, black, transparent 72%);
    z-index: 0;
  }

  /* White-label header: make the left rail obviously Workspace Alberta. */
  #app-sidebar > div:first-child {
    min-height: 5.75rem;
    align-items: center;
    background:
      linear-gradient(90deg, rgba(0, 94, 184, 0.26), rgba(242, 165, 65, 0.14)),
      color-mix(in srgb, var(--workspace-alberta-pine) 88%, black);
  }

  #app-sidebar > div:first-child > div:first-child {
    width: 100%;
    align-items: center;
    gap: 0.75rem;
  }

  /* Alberta flag badge: blue field, small Union Jack hint, and gold shield. */
  #app-sidebar > div:first-child > div:first-child::before {
    content: "";
    display: block;
    width: 3.7rem;
    height: 2.35rem;
    flex: 0 0 auto;
    border-radius: 0.28rem;
    border: 1px solid rgba(244, 233, 216, 0.72);
    box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.3), 0 8px 26px rgba(0, 0, 0, 0.24);
    background:
      radial-gradient(ellipse at 64% 54%, #F2D36B 0 12%, transparent 13%),
      linear-gradient(#3B8A3E, #3B8A3E) 57% 58% / 0.74rem 0.28rem no-repeat,
      linear-gradient(#FFFFFF, #FFFFFF) 0 0 / 1.55rem 1.1rem no-repeat,
      linear-gradient(33deg, transparent 42%, #D71920 43% 51%, transparent 52%) 0 0 / 1.55rem 1.1rem no-repeat,
      linear-gradient(-33deg, transparent 42%, #D71920 43% 51%, transparent 52%) 0 0 / 1.55rem 1.1rem no-repeat,
      linear-gradient(90deg, transparent 42%, #D71920 43% 57%, transparent 58%) 0 0 / 1.55rem 1.1rem no-repeat,
      linear-gradient(0deg, transparent 42%, #D71920 43% 57%, transparent 58%) 0 0 / 1.55rem 1.1rem no-repeat,
      var(--workspace-alberta-flag-blue);
  }

  /* Hide the default hard-coded Hermes/Agent text and paint our brand. */
  #app-sidebar > div:first-child > div:first-child > *:last-child {
    position: relative;
    min-width: 8.75rem;
    color: transparent !important;
    font-size: 0 !important;
    line-height: 0 !important;
  }

  #app-sidebar > div:first-child > div:first-child > *:last-child::after {
    content: "Workspace\A Alberta";
    white-space: pre;
    display: block;
    color: var(--workspace-alberta-cream);
    font-family: Inter, system-ui, -apple-system, "Segoe UI", sans-serif;
    font-size: 1.05rem;
    font-weight: 800;
    line-height: 0.95;
    letter-spacing: -0.045em;
    text-transform: none;
    text-shadow: 0 0 18px rgba(242, 165, 65, 0.34);
  }

  /* Mobile header brand override. */
  header > *:last-child {
    color: transparent !important;
    font-size: 0 !important;
  }

  header > *:last-child::after {
    content: "WorkspaceAlberta";
    color: var(--workspace-alberta-cream);
    font-size: 1rem;
    font-weight: 800;
    letter-spacing: -0.04em;
  }

  .blend-lighter {
    letter-spacing: -0.035em;
  }

  a {
    text-underline-offset: 0.18em;
  }
